services:
  fusional:
    image: fusional
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:5173,http://localhost:8089,http://localhost:8009"
      PORT: "8009"
    ports:
      - 127.0.0.1:8089:8009
    networks:
      - default
      - mcp-kit

networks:
  default: {}
  mcp-kit:
    name: mcp-consulting-kit_default
    external: true
